server_tokens off;

server {
    listen 8085;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;

    gzip on;
    gzip_types text/css application/javascript image/svg+xml application/json;

    # Fichiers hashés par Vite : mise en cache longue durée
    location ~* \.(?:js|css|svg|png|jpg|jpeg|woff2?)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # Pas de routeur côté client (one-page avec ancres) : les URL inconnues
    # doivent renvoyer un vrai 404, pas l'accueil — évite de masquer les
    # sondes automatiques (.env, .git/config...) sous des faux 200.
    location / {
        try_files $uri $uri/ =404;
    }
}
